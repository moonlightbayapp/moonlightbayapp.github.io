    .channel-select {

      background-repeat: no-repeat;

    .channel-select:focus {

    select option {

<body>
            <div class="time-display" id="timeDisplay"></div>
      <div class="signal-dots" id="signalBars">
          <div class="signal-dot"></div>
          <div class="signal-dot"></div>

  <div class="screen">
      <div class="band-type" id="bandTypeDisplay"></div>
      <div class="channel-name" id="channelName">Loading channel...</div>
      <div class="city-name" id="cityName">Loading city...</div>
  </div>

  <div class="dock">
      <div class="controls">
      <button class="btn" onclick="prevChannel()"><i class="fas fa-backward"></i></button>
      <button class="btn" onclick="nextChannel()"><i class="fas fa-forward"></i></button>
      </div>
    <button class="toggle-dropdown" onclick="toggleChannelDropdown()">Select Stations</button>
    <select id="channelDropdown" class="channel-select" onchange="selectChannelFromDropdown()">
  </div>
    <audio id="radioPlayer" controls autoplay>
      <source id="audioSource" src="" type="audio/mpeg">
      Your browser does not support audio.
    </audio>
  <div class="speaker-grill" id="speakerGrill">
            </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.33/moment-timezone-with-data.min.js"></script>
    <script>
        const radioChannels = [
    { name: "Select Channels", city: "", url: "5.5.5.5" },
    { name: "MOONLIGHTBAY RADIO", city: "Jakarta", url: "https://stream.zeno.fm/0fzczoweasyvv" },
    { name: "COLD CHILLIN FM", city: "Jakarta", url: "https://stream.zeno.fm/tjo1n2pika5uv" },
    { name: "JAZZ ABE RADIO", city: "Jakarta", url: "https://stream.zeno.fm/crx79tt7cxhvv" },
    { name: "URFAN RADIO", city: "Sukoharjo", url: "https://radio.urfan.id/" },
    { name: "SUARA EDUKASI", city: "Jakarta", url: "https://radioedukasi.kemdikbud.go.id:9443/stream.mp3" },
    { name: "TRAX", city: "Jakarta", url: "https://stream.radiojar.com/rrqf78p3bnzuv.mp3" },
    { name: "BEAT", city: "Jakarta", url: "https://stream.beatradioid.com:8000/stream" },
    { name: "KBR", city: "Jakarta", url: "https://i.klikhost.com/8056/kbr" },
    { name: "COSMOPOLITAN", city: "Jakarta", url: "https://stream.radiojar.com/u7d8heq3bnzuv" },
    { name: "RAYYA CHANNEL", city: "Jakarta", url: "https://radio.beta.noice.id/proxy?url=http%3A%2F%2F103.246.184.62%3A1935%2Fnoice_rayya%2Frayya.stream%2Fchunklist_w1931251962.m3u8" },
    { name: "DREAMERS", city: "Jakarta", url: "https://live.dreamers.id:8443/live" },
    { name: "LOKER MUSIK", city: "Jakarta", url: "https://stream.lokermusik.com/listen/lokermusik/lokermusik" },
        ];

        let currentIndex = 0;
        let currentChannelTitle = "Memuat channel...";
        let currentCityName = "Memuat kota...";
        let noSignalTimeout;
        let signalBarUpdateInterval;
        const AUTO_SKIP_DELAY = 5000;
        const SIGNAL_UPDATE_INTERVAL_MS = 500;

        const MAX_BUFFERED_FOR_FULL_SIGNAL = 5;
        const MIN_BUFFERED_FOR_ACTIVE_SIGNAL = 0.5;

        const audioPlayer = document.getElementById("radioPlayer");
        const audioSource = document.getElementById("audioSource");
        const channelNameDisplay = document.getElementById("channelName");
        const cityNameDisplay = document.getElementById("cityName");
        const timeDisplay = document.getElementById("timeDisplay");
        const currencyTickerText = document.getElementById('currencyTickerText');
        const newsTickerText = document.getElementById('newsTickerText');
        const ipodContainer = document.querySelector('.ipod-container');

        const signalBarsContainer = document.getElementById("signalBars");
        const signalBars = [];

        // Elemen dropdown
        const toggleDropdownBtn = document.querySelector('.toggle-dropdown-btn');
        const channelDropdown = document.getElementById('channelDropdown');


        for (let i = 1; i <= 10; i++) {
            const bar = document.createElement('div');
            bar.className = 'bar';
            bar.style.setProperty('--i', i);
            signalBarsContainer.appendChild(bar);
            signalBars.push(bar);
        }

        function extractFrequency(name) {
            const match = name.match(/^(\d+(\.\d+)?)/);
            return match ? match[0] : '----';
        }

        function extractChannelTitle(name) {
            return name.replace(/^(\d+(\.\d+)?)\s*/, "").trim();
        }

        function updateSignalBars(bufferedDuration) {
            signalBars.forEach(bar => bar.classList.remove("active"));

            const activeCount = Math.min(
                signalBars.length,
                Math.floor(bufferedDuration / (MAX_BUFFERED_FOR_FULL_SIGNAL / signalBars.length))
            );

            for (let i = 0; i < activeCount; i++) {
                signalBars[i].classList.add("active");
            }

            if (bufferedDuration < MIN_BUFFERED_FOR_ACTIVE_SIGNAL && audioPlayer.src && !audioPlayer.paused && !audioPlayer.ended) {
                signalBarsContainer.classList.add("red");
            } else {
                signalBarsContainer.classList.remove("red");
            }
        }

        function loadChannel(index) {
            if (noSignalTimeout) {
                clearTimeout(noSignalTimeout);
                noSignalTimeout = null;
            }
            if (signalBarUpdateInterval) {
                clearInterval(signalBarUpdateInterval);
                signalBarUpdateInterval = null;
            }

            currentIndex = index; // Pastikan currentIndex diupdate
            const channel = radioChannels[currentIndex];
            audioSource.src = channel.url;
            
            currentChannelTitle = extractChannelTitle(channel.name);
            currentCityName = channel.city;
            channelNameDisplay.textContent = currentChannelTitle;
            cityNameDisplay.textContent = currentCityName;
            
            updateSignalBars(0);
            
            audioPlayer.load();
            audioPlayer.play().catch(error => {
                console.error("Autoplay failed:", error);
                channelNameDisplay.textContent = "Press Play for start!";
                cityNameDisplay.textContent = "";
                updateSignalBars(0);
                signalBarsContainer.classList.add("red");
            });
            updateMediaSession(currentChannelTitle, "");

            // Pastikan dropdown kembali ke posisi awal dan sembunyi
            if (channelDropdown.style.display !== 'none') {
                channelDropdown.style.display = 'none';
                toggleDropdownBtn.textContent = 'Select Stations'; // Reset teks tombol
            }
        }

        function nextChannel() {
            currentIndex = (currentIndex + 1) % radioChannels.length;
            loadChannel(currentIndex);
        }

        function prevChannel() {
            currentIndex = (currentIndex - 1 + radioChannels.length) % radioChannels.length;
            loadChannel(currentIndex);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (ipodContainer.requestFullscreen) {
                    ipodContainer.requestFullscreen();
                } else if (ipodContainer.mozRequestFullScreen) {
                    ipodContainer.mozRequestFullScreen();
                } else if (ipodContainer.webkitRequestFullscreen) {
                    ipodContainer.webkitRequestFullscreen();
                } else if (ipodContainer.msRequestFullscreen) {
                    ipodContainer.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullScreen();
                }
            }
        }

        function updateMediaSession(title, songTitleText) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title,
                    artist: "Radio Digital",
                    album: "Radio",
                    artwork: [{ src: "https://via.placeholder.com/96", sizes: "96x96", type: "image/png" }]
                });

                navigator.mediaSession.setActionHandler("previoustrack", prevChannel);
                navigator.mediaSession.setActionHandler("nexttrack", nextChannel);
            }
        }

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            timeDisplay.textContent = `${hours}:${minutes}`;
        }

        // --- Event Listeners Audio Player ---
        audioPlayer.addEventListener('waiting', () => {
            channelNameDisplay.textContent = "scanning...";
            cityNameDisplay.textContent = "";
            updateSignalBars(0);
            signalBarsContainer.classList.add("red");
            
            if (signalBarUpdateInterval) { clearInterval(signalBarUpdateInterval); signalBarUpdateInterval = null; }

            if (!noSignalTimeout) {
                noSignalTimeout = setTimeout(() => {
                    console.warn("Tidak ada sinyal selama 5 detik, melompat ke channel berikutnya.");
                    nextChannel();
                }, AUTO_SKIP_DELAY);
            }
        });

        audioPlayer.addEventListener('playing', () => {
            if (noSignalTimeout) {
                clearTimeout(noSignalTimeout);
                noSignalTimeout = null;
            }
            signalBarsContainer.classList.remove("red");
            channelNameDisplay.textContent = currentChannelTitle;
            cityNameDisplay.textContent = currentCityName;

            if (!signalBarUpdateInterval) {
                signalBarUpdateInterval = setInterval(() => {
                    if (audioPlayer.buffered.length > 0) {
                        const bufferedEnd = audioPlayer.buffered.end(audioPlayer.buffered.length - 1);
                        const bufferedDuration = bufferedEnd - audioPlayer.currentTime;
                        updateSignalBars(bufferedDuration);
                    } else {
                        updateSignalBars(0);
                    }
                }, SIGNAL_UPDATE_INTERVAL_MS);
            }
        });

        audioPlayer.addEventListener('error', () => {
            console.error('Error saat memutar audio. Mungkin stream tidak tersedia atau URL salah.');
            updateSignalBars(0);
            signalBarsContainer.classList.add("red");
            channelNameDisplay.textContent = "No Signal!";
            cityNameDisplay.textContent = "";

            if (signalBarUpdateInterval) { clearInterval(signalBarUpdateInterval); signalBarUpdateInterval = null; }

            if (!noSignalTimeout) {
                noSignalTimeout = setTimeout(() => {
                    console.warn("Error sinyal selama 5 detik, melompat ke channel berikutnya.");
                    nextChannel();
                }, AUTO_SKIP_DELAY);
            }
        });

        audioPlayer.addEventListener('ended', () => {
            if (signalBarUpdateInterval) { clearInterval(signalBarUpdateInterval); signalBarUpdateInterval = null; }
            updateSignalBars(0);
        });
        
        audioPlayer.addEventListener('pause', () => {
            if (signalBarUpdateInterval) { clearInterval(signalBarUpdateInterval); signalBarUpdateInterval = null; }
            updateSignalBars(0);
        });


        // --- Fungsi Dropdown ---
        function populateChannelDropdown() {
            channelDropdown.innerHTML = '';
            radioChannels.forEach((channel, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${extractChannelTitle(channel.name)} (${channel.city})`;
                channelDropdown.appendChild(option);
            });
            channelDropdown.value = currentIndex;
        }

        function toggleChannelDropdown() {
            if (channelDropdown.style.display === 'block') {
                channelDropdown.style.display = 'none';
                toggleDropdownBtn.textContent = 'Select Stations';
            } else {
                populateChannelDropdown();
                channelDropdown.style.display = 'block';
                toggleDropdownBtn.textContent = 'Hide Stations';
                channelDropdown.focus();
            }
        }

        function selectChannelFromDropdown() {
            const selectedIndex = parseInt(channelDropdown.value);
            if (!isNaN(selectedIndex)) {
                loadChannel(selectedIndex);
            }
            channelDropdown.style.display = 'none';
            toggleDropdownBtn.textContent = 'Select Stations';
        }

        // --- Inisialisasi ---
        loadChannel(currentIndex);
        populateChannelDropdown();

        setInterval(updateClock, 1000);
        updateClock();

        // --- News Ticker (Berita Umum) ---
        const rssUrlGlobalNews = 'https://rss2json.com/api.json?rss_url=https://news.google.com/rss?hl=id&gl=ID&ceid=ID:id';

        fetch(rssUrlGlobalNews)
            .then(response => response.json())
            .then(data => {
                const items = data.items.slice(0, 10);
                const news = items.map(item => `<a href="${item.link}" target="_blank" style="color: inherit; text-decoration: none;">${item.title}</a>`).join(' ⸻ ');
                newsTickerText.innerHTML = news + ' ⸻ ' + news;
            })
            .catch(err => {
                console.error('Gagal memuat berita:', err);
                newsTickerText.innerText = 'Gagal memuat berita.';
            });

        // --- News Ticker (Mata Uang) ---
        const API_KEY = 'ff02e69277ba2c663c5bef63';
        const BASE_CURRENCY = 'IDR';
        const TARGET_CURRENCIES = [
            "USD", "SGD", "MYR", "JPY", "SAR", "CNY"
        ];

        let previousRates = {};

        async function fetchCurrencyRates() {
            try {
                const url = `https://v6.exchangerate-api.com/v6/${API_KEY}/latest/${BASE_CURRENCY}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.result === 'success') {
                    let currencyString = "";
                    TARGET_CURRENCIES.forEach(currency => {
                        const rate = data.conversion_rates[currency];
                        if (rate) {
                            const valueInIDR = (1 / rate).toFixed(2);
                            let arrowHtml = '';

                            if (previousRates[currency] !== undefined) {
                                if (parseFloat(valueInIDR) > parseFloat(previousRates[currency])) {
                                    arrowHtml = '<span class="currency-arrow up"></span>';
                                } else if (parseFloat(valueInIDR) < parseFloat(previousRates[currency])) {
                                    arrowHtml = '<span class="currency-arrow down"></span>';
                                } else {
                                    arrowHtml = '<span class="currency-arrow unchanged"></span>';
                                }
                            }
                            previousRates[currency] = valueInIDR;

                            currencyString += ` 1 ${currency} = ${valueInIDR} IDR ${arrowHtml} ⸻ `;
                        }
                    });
                    currencyTickerText.innerHTML = currencyString.trim() + currencyString.trim();
                } else {
                    console.error("Gagal mengambil data nilai tukar:", data.result, data['error-type']);
                    currencyTickerText.innerText = 'Gagal memuat nilai tukar: ' + (data['error-type'] || 'Terjadi kesalahan');
                }
            } catch (error) {
                console.error("Kesalahan saat mengambil data nilai tukar:", error);
                currencyTickerText.innerText = 'Gagal memuat nilai tukar (koneksi/API Key salah).';
            }
        }

        fetchCurrencyRates();
        setInterval(fetchCurrencyRates, 30 * 60 * 1000);
    </script>

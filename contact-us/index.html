<!DOCTYPE html>
<html lang="en-US">
<head>
    <title>HUBUNGI KAMI - MoonlightBay Plus</title>
    <script src="/head-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

<div class="contact-page-wrapper">
    <div class="contact-card">
        <header class="contact-header">
            <h1>Hubungi Kami</h1>
            <p>Punya pertanyaan, saran, atau laporan channel rusak? Kirimkan pesan Anda di bawah ini.</p>
        </header>

            <form action="https://formspree.io/f/meepkgzk" method="POST" class="contact-form">
              <div class="form-row">
                <div class="input-group">
                    <input type="text" name="name" placeholder="Nama Lengkap" required>
                </div>
                <div class="input-group">
                    <input type="email" name="email" placeholder="Alamat Email" required>
                </div>
                <div class="input-group">
                    <textarea name="message" rows="5" placeholder="Tulis pesan Anda di sini..." required></textarea>
                </div>
                <button type="submit" class="btn-send">Kirim Pesan <i class="fa-solid fa-paper-plane"></i></button>
            </form>

            <div class="divider">
                 <span>Atau melalui Media Sosial</span>
            </div>
            <div class="social-grid">
                <a href="https://www.facebook.com/moonlightbaytv" class="social-btn facebook"><i class="fa-brands fa-facebook"></i> @moonlightbaytv</a>
                <a href="https://www.instagram.com/moonlightbay_tv" class="social-btn instagram"><i class="fa-brands fa-instagram"></i> @moonlightbay_tv</a>
                <a href="https://www.threads.com/@moonlightbay_tv" class="social-btn threads"><i class="fa-brands fa-threads"></i> @moonlightbay_tv</a>
                <a href="https://x.com/MoonlightBay_TV" class="social-btn x-twitter"><i class="fa-brands fa-x-twitter"></i> @moonlightbay_tv</a>
                <a href="https://www.youtube.com/@MoonlightBay_TV" class="social-btn youtube"><i class="fa-brands fa-youtube"></i> @MoonlightBay_TV</a>
                <a href="https://www.tiktok.com/@moonlightbay_tv" class="social-btn tiktok"><i class="fa-brands fa-tiktok"></i> @moonlightbay_tv</a>
            </div>
        </div>
    </div>

    <script src="/main.js"></script>
</body>
</html>

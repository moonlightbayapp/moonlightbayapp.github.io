<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scary Maze Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Warna dasar dinding labirin */
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Mencegah scroll agar kursor tidak curang */
            user-select: none;
        }

        /* Tampilan Layar Utama */
        #start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff0000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }

        button:hover {
            background-color: #cc0000;
        }

        /* Area Game / Jalur Aman */
        #game-area {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
            cursor: crosshair; /* Mengubah kursor agar terasa seperti game */
        }

        .path {
            position: absolute;
            background-color: #00ff00; /* Warna jalur aman yang ikonik */
        }

        /* Desain Level 3 (Sangat Sempit) */
        #path-1 { top: 10%; left: 10%; width: 80%; height: 50px; }
        #path-2 { top: 10%; left: 80%; width: 50px; height: 60%; }
        #path-3 { top: 65%; left: 20%; width: 65%; height: 30px; } /* Mulai menyempit */
        #path-4 { top: 30%; left: 20%; width: 20px; height: 38%; } /* Sangat sempit, rawan gagal */
        #path-5 { top: 30%; left: 20%; width: 150px; height: 15px; } /* Jalur maut menuju finish */

        /* Titik Mulai dan Selesai */
        .start-zone {
            position: absolute;
            top: 10%;
            left: 5%;
            background-color: #0000ff;
            width: 5%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .finish-zone {
            position: absolute;
            top: 28%;
            left: 35%;
            background-color: #ff0000;
            width: 30px;
            height: 20px;
        }

        /* Layar Jumpscare */
        #jumpscare-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
            background-color: black;
        }

        #jumpscare-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1>Scary Maze Game</h1>
        <p>Arahkan kursor Anda melalui jalur hijau tanpa menyentuh area hitam.</p>
        <button onclick="startGame()">Mulai Game</button>
    </div>

    <div id="game-area" onmouseleave="gameOver()">
        
        <div class="start-zone">Start</div>
        
        <div class="path" id="path-1"></div>
        <div class="path" id="path-2"></div>
        <div class="path" id="path-3"></div>
        <div class="path" id="path-4"></div>
        <div class="path" id="path-5"></div>

        <div class="finish-zone" onmouseenter="triggerJumpscare()"></div>

    </div>

    <div id="jumpscare-screen">
        <img src="https://i.ytimg.com/vi/uZpMmP5EUEI/mqdefault.jpg" alt="Scary Face">
    </div>

    <audio id="scream-audio" src="https://www.myinstants.com/media/sounds/loud-screaming-sound-effect-hd.mp3" preload="auto"></audio>

    <script>
        const startScreen = document.getElementById('start-screen');
        const gameArea = document.getElementById('game-area');
        const jumpscareScreen = document.getElementById('jumpscare-screen');
        const screamAudio = document.getElementById('scream-audio');

        function startGame() {
            startScreen.style.display = 'none';
            gameArea.style.display = 'block';
            
            // Opsional: Meminta Fullscreen saat game dimulai untuk imersi yang lebih baik
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch((err) => {
                    console.log("Fullscreen ditolak oleh browser.");
                });
            }
        }

        function gameOver() {
            // Hanya reset jika jumpscare belum terpicu
            if (jumpscareScreen.style.display === 'block') return;

            alert('Kursor Anda keluar dari jalur! Kembali ke awal.');
            gameArea.style.display = 'none';
            startScreen.style.display = 'flex';
        }

        function triggerJumpscare() {
            // Sembunyikan labirin, tampilkan gambar hantu
            gameArea.style.display = 'none';
            jumpscareScreen.style.display = 'block';
            
            // Mainkan suara teriakan
            screamAudio.volume = 1.0;
            screamAudio.play();

            // Mengembalikan pemain ke menu utama setelah 3 detik
            setTimeout(() => {
                jumpscareScreen.style.display = 'none';
                startScreen.style.display = 'flex';
                // Keluar dari fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }, 3000);
        }
    </script>
</body>
</html>
